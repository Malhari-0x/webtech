<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <center>
        <fieldset>
            <legend>REGISTRATION</legend>
            <form action="">
                <table>
                    <tr>
                        <td><label for="">FIRST NAME:</label></td>
                        <td><input type="text" name="" id=""></td>
                    </tr>

                    <tr>
                        <td><label for="">LAST NAME:</label></td>
                        <td><input type="text" name="" id=""></td>
                    </tr>

                    <tr>
                        <td><label for="">DOB:</label></td>
                        <td><input type="date" name="" id=""></td>
                    </tr>
                    <tr>
                        <td><label for="gen">GENDER:</label></td>
                        <td>MALE <input type="radio" name="gen" id="">FEMALE <input type="radio" name="gen" id=""></td>
                    </tr>
                    <tr>
                        <td><label for="">PHNO:</label></td>
                        <td><input type="number" name="" id=""></td>
                    </tr>
                    <tr>
                        <td><label for="">EMAIL:</label></td>
                        <td><input type="email" name="" id=""></td>
                    </tr>
                    <tr>
                        <td><label for="">QUALIFICATION:</label></td>
                        <td>
                            <select name="" id="">
                                <option value="">select</option>
                                <option value="">Engineer</option>
                                <option value="">Computer Science</option>
                                <option value="">Diploma</option>
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <td><label for="">LANGUAGEs:</label></td>
                        <td>ENGLISH<input type="checkbox" name="" id="">MARATHI <input type="checkbox" name="" id="">KANNADA <input type="checkbox" name="" id=""></td>
                    </tr>
                    <tr>
                        <td><label for="">RESUME:</label></td>
                        <td><input type="file" name="" id=""></td>
                    </tr>
                    <tr>
                        <td><input type="submit" value="Submit"></td>
                        <td><input type="reset" value="Reset"></td>
                    </tr>
                </table>

            </form>
        </fieldset>
    </center>
</body>

</html>
