<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Student Registration Form</title>

</head>

<body>
    <center>
        <h1>
            <U>STUDENT REGISTRATION FORM</U>
        </h1>
        <fieldset style="width: 350px; border:2px solid black">
            <form action="" style="border: 2px solid black ;background-color:palegoldenrod; padding:10px;">
                <table>
                    <tr>
                        <td><label for="">FIRST NAME:</label></td>
                        <td><input type="text" name="" id="" required placeholder="Enter Name"> (max 30 characters a-z and A-Z) </td>
                    </tr>
                    <tr>
                        <td><label for="">LAST NAME:</label></td>
                        <td><input type="text" name="" id="" required placeholder="Enter Last Name"> (max 30 characters a-z and A-Z)</td>
                    </tr>
                    <tr>
                        <td><label for="">DATE OF BIRTH:</label></td>
                        <td>
                            <select name="" id="">
                            <option value="">DAY</option>
                            <option value="">1</option>
                            <option value="">2</option>
                            <option value="">3</option>
                            <option value="">4</option>
                            <option value="">5</option>
                            <option value="">6</option>
                            <option value="">7</option>
                            <option value="">8</option>
                            <option value="">9</option>
                        </select>
                            <select name="" id="">
                            <option value="">MONTH</option>
                            <option value="">JAN</option>
                            <option value="">FEB</option>
                            <option value="">MAR</option>
                            <option value="">APR</option>
                            <option value="">MAY</option>
                            <option value="">JUN</option>
                            <option value="">JUL</option>
                            <option value="">AUG</option>
                            <option value="">SEP</option>
                            <option value="">OCT</option>
                            <option value="">NOV</option>
                            <option value="">DEC</option>
                        </select>
                            <select name="" id="">
                            <option value="">YEAR</option>
                            <option value="">2000</option>
                            <option value="">2001</option>
                            <option value="">2002</option>
                            <option value="">2003</option>
                            <option value="">2004</option>
                        </select>
                        </td>
                    </tr>
                    <tr>
                        <td><label for="">EMAIL ID:</label></td>
                        <td><input type="email" name="" id="" required placeholder="Enter Email"></td>
                    </tr>
                    <tr>
                        <td><label for="">MOBILE NO:</label></td>
                        <td><input type="number" name="" id="" required placeholder="Enter Phone_No"> (10 digit number)</td>
                    </tr>
                    <tr>
                        <td><label for="">GENDER:</label></td>
                        <td>MALE<input type="radio" name="" id="">FEMALE <input type="radio" name="" id=""></td>
                    </tr>
                    <tr>
                        <td><label for="">ADDRESS:</label></td>
                        <td><textarea name="" id="" rows="6" cols="30"></textarea></td>
                    </tr>
                    <tr>
                        <td><label for="">CITY:</label></td>
                        <td><input type="text" name="" id="" required placeholder="Enter City"> (max 30 character a-z and A-Z)</td>
                    </tr>
                    <tr>
                        <td><label for="">PINCODE:</label></td>
                        <td><input type="number" name="" id="" required placeholder="Enter Pincode"> (6 digit number)</td>
                    </tr>
                    <tr>
                        <td><label for="">STATE:</label></td>
                        <td><input type="text" name="" id="" required placeholder="Enter State"> (max 30 character a-z and A-Z)</td>
                    </tr>
                    <tr>
                        <td><label for="">COUNTRY:</label></td>
                        <td><input type="text" name="" id="" value="India"></td>
                    </tr>
                    <tr>
                        <td><label for="">HOBBIES:</label></td>
                        <td>Drawing <input type="checkbox" name="" id=""> Singing <input type="checkbox" name="" id=""> Dancing <input type="checkbox" name="" id=""><br>Other <input type="checkbox" name="" id=""><input type="text" name="" id=""></td>
                    </tr>
                    <tr>
                        <td><label for="">QUALIFICATION</label></td>
                        <td>
                            <table>
                                <tr style="background-color: grey;">
                                    <td><label for="">SI.No.Examination</label></td>
                                    <td><label for="">Board</label></td>
                                    <td><label for="">Percentage</label></td>
                                    <td><label for="">Year Of Passing</label></td>
                                </tr>
                                <tr>
                                    <td style="background-color:cadetblue;"><label for="">Class X</label></td>
                                    <td><input type="text" name="" id=""></td>
                                    <td><input type="text" name="" id=""></td>
                                    <td><input type="text" name="" id=""></td>
                                </tr>
                                <tr>
                                    <td style="background-color:darkgray"><label for="">Class XII</label></td>
                                    <td><input type="text" name="" id=""></td>
                                    <td><input type="text" name="" id=""></td>
                                    <td><input type="text" name="" id=""></td>
                                </tr>
                                <tr>
                                    <td style="background-color:cadetblue;"><label for="">Graduation</label></td>
                                    <td><input type="text" name="" id=""></td>
                                    <td><input type="text" name="" id=""></td>
                                    <td><input type="text" name="" id=""></td>
                                </tr>
                                <tr>
                                    <td style="background-color:darkgray;"><label for="">Masters</label></td>
                                    <td><input type="text" name="" id=""></td>
                                    <td><input type="text" name="" id=""></td>
                                    <td><input type="text" name="" id=""></td>
                                </tr>

                            </table>
                        </td>
                    </tr>
                    <tr>
                        <td><label for="">COURSES APPLIED FOR</label></td>
                        <td>BCA <input type="radio" name="" id="">BCOM <input type="radio" name="" id="">Bsc <input type="radio" name="" id=""></td>
                    </tr>
                    <tr>
                        <td></td>
                        <td><input type="submit" value="SUBMIT" style="background-color:lightsalmon;"> <input type="reset" value="RESET" style="background-color: lightsalmon;"></td>
                    </tr>

                </table>
            </form>
        </fieldset>
    </center>
</body>

</html>
